<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZCUBE Lab - v1.6.4 Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 p-4">
    <div class="max-w-[1200px] mx-auto">
        <header class="mb-6 border-b border-slate-700 pb-4 flex justify-between items-center">
            <h2 class="text-2xl font-black text-emerald-400 italic uppercase">
                KAZCUBE Lab 
                <span id="version-display" class="text-xs text-white not-italic ml-2 tracking-widest">v1.6.4</span>
            </h2>
            <div class="mode-switch w-48 flex bg-black/40 rounded-lg p-1">
                <button id="mode-rotate" class="flex-1 py-1 text-xs font-black rounded active">ROTATE</button>
                <button id="mode-paint" class="flex-1 py-1 text-xs font-black rounded">PAINT</button>
            </div>
        </header>

        <div class="main-grid grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="left-col space-y-4">
                <div id="cube-wrapper" class="aspect-square bg-black rounded-3xl flex items-center justify-center">
                     <twisty-player 
                        id="main-cube" 
                        puzzle="3x3x3" 
                        background="none" 
                        control-panel="none">
                     </twisty-player>
                </div>

                <div id="paint-controls" class="hidden bg-slate-800 p-4 rounded-2xl">
                    <div class="flex gap-2 justify-center mb-4">
                        <button class="color-chip w-8 h-8 rounded-full bg-white border-2 border-emerald-400" data-color="white"></button>
                        <button class="color-chip w-8 h-8 rounded-full bg-yellow-400" data-color="yellow"></button>
                        <button class="color-chip w-8 h-8 rounded-full bg-red-600" data-color="red"></button>
                        <button class="color-chip w-8 h-8 rounded-full bg-blue-600" data-color="blue"></button>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button id="preset-gray" class="bg-rose-900 text-[10px] py-2 rounded font-black">RESET GRAY</button>
                        <button id="preset-cc" class="bg-slate-700 text-[10px] py-2 rounded font-black">C+CORNER</button>
                        <button id="preset-co" class="bg-slate-700 text-[10px] py-2 rounded font-black">CORNERS</button>
                    </div>
                </div>
                
                <div id="rotate-controls" class="bg-slate-800 p-5 rounded-2xl">
                    <input type="range" id="move-slider" min="0" max="0" value="0" class="w-full">
                    <div class="flex justify-between mt-4 font-mono text-emerald-400">
                        <span>Step: <span id="step-counter">0</span></span>
                        <div id="move-indicator">---</div>
                    </div>
                </div>
            </div>

            <div class="right-col space-y-4">
                <textarea id="command-box" class="w-full h-32 bg-black text-emerald-400 p-4 rounded-xl border border-slate-700 font-mono text-sm" placeholder="Algorithm here..."></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-scramble" class="bg-indigo-600 py-3 rounded font-black">SCRAMBLE</button>
                    <button id="btn-setup" class="bg-slate-700 py-3 rounded font-black text-amber-400">SET SETUP</button>
                </div>
                <button id="btn-reset-alg" class="w-full bg-slate-800 py-2 rounded text-xs text-slate-400">RESET ALL</button>
                <div id="move-grid" class="grid grid-cols-6 gap-2"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js" type="module"></script>
</body>
</html>
