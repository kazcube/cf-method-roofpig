<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZCUBE Lab - Paint & Rotate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; overflow: hidden; font-family: sans-serif; }
        twisty-player { width: 100%; height: 100%; background: transparent; --twisty-frame-background: none; }
        #main-cube { filter: drop-shadow(0 25px 25px rgb(0 0 0 / 0.5)); }
        .no-select { user-select: none; -webkit-tap-highlight-color: transparent; }
        input[type="range"] { accent-color: #10b981; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col no-select">

    <!-- Header -->
    <header class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-md z-10">
        <div class="flex items-center gap-2">
            <div class="w-2 h-6 bg-emerald-500 rounded-full"></div>
            <h1 class="text-sm font-black tracking-tighter text-slate-200">KAZCUBE <span class="text-emerald-500">LAB</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="location.reload()" class="p-2 text-slate-400 hover:text-white transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 relative flex flex-col overflow-hidden">
        
        <!-- Cube Stage -->
        <div class="flex-1 flex items-center justify-center p-4 relative">
            <twisty-player 
                id="main-cube"
                puzzle="3x3x3"
                initial-pose="custom"
                camera-latitude="30"
                camera-longitude="-30"
                background="none"
                control-panel="none"
                hint-stickers="none"
                back-view="none"
            ></twisty-player>

            <!-- Floating Move Indicator -->
            <div class="absolute top-6 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-slate-900/80 backdrop-blur border border-slate-700 rounded-full shadow-2xl z-20">
                <span id="move-indicator" class="text-[11px] font-black text-emerald-400 tracking-widest uppercase">---</span>
            </div>
        </div>

        <!-- Mode & Tool Container -->
        <div class="px-4 pb-4 w-full max-w-lg mx-auto space-y-4">
            
            <!-- Mode Selector + Sub Panels (Dynamic) -->
            <div id="mode-container" class="flex items-center justify-between bg-slate-900/80 p-1 rounded-xl border border-slate-800 shadow-xl">
                <div class="flex p-0.5 gap-1">
                    <button id="mode-rotate" class="px-5 py-2 bg-emerald-500 font-black text-[10px] rounded-lg text-white shadow-lg shadow-emerald-500/20 transition">ROTATE</button>
                    <button id="mode-paint" class="px-5 py-2 bg-slate-800 text-slate-500 font-black text-[10px] rounded-lg hover:text-white transition">PAINT</button>
                </div>
                <!-- Paint Palette or Orbit buttons will be injected here by paint-tool.js -->
            </div>

            <!-- Main Control Grid (Rotate Mode) -->
            <div id="move-grid-container" class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800 shadow-xl space-y-4">
                <div id="move-grid" class="grid grid-cols-6 gap-2">
                    <!-- Buttons injected via app.js -->
                </div>

                <!-- Slider & Play -->
                <div class="flex items-center gap-4 bg-slate-950/50 p-3 rounded-xl border border-slate-800">
                    <button id="play-btn" class="w-10 h-10 flex items-center justify-center bg-emerald-600 rounded-full text-white hover:bg-emerald-500 transition active:scale-90 shadow-lg shadow-emerald-900/20">
                        <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <div class="flex-1 space-y-1">
                        <div class="flex justify-between text-[9px] font-bold text-slate-500 uppercase tracking-tighter">
                            <span>Step <span id="step-counter" class="text-emerald-500">0</span></span>
                            <span>Timeline</span>
                        </div>
                        <input type="range" id="move-slider" min="0" max="0" value="0" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>

            <!-- Command Bar -->
            <div class="flex gap-2">
                <input type="text" id="command-box" placeholder="U R U' R' ..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm font-mono text-emerald-400 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
                <button id="apply-btn" class="px-6 bg-slate-100 text-slate-900 font-black text-xs rounded-xl hover:bg-white active:scale-95 transition">APPLY</button>
            </div>

            <!-- Sub Actions -->
            <div class="flex gap-2">
                <button id="scramble-btn" class="flex-1 py-3 bg-slate-800/50 text-slate-300 font-bold text-[10px] rounded-xl border border-slate-700 hover:bg-slate-800 transition uppercase tracking-widest">Scramble</button>
                <button id="reset-btn" class="flex-1 py-3 bg-slate-800/50 text-rose-400 font-bold text-[10px] rounded-xl border border-slate-700 hover:bg-slate-800 transition uppercase tracking-widest">Reset All</button>
            </div>
        </div>
    </main>

    <!-- Footer / Hash -->
    <footer class="p-3 border-t border-slate-800 bg-slate-900/80">
        <input type="text" id="hash-display" readonly class="w-full bg-transparent text-[8px] font-mono text-slate-600 border-none focus:outline-none" value="">
    </footer>

    <!-- Scripts -->
    <!-- キャッシュを回避するため、クエリパラメータに最新バージョン v2.0.44 を指定 -->
    <script type="module">
        import { initApp } from './js/app.js?v=2.0.44';
        window.onload = initApp;
    </script>
</body>
</html>
