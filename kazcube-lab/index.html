<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZCUBE Lab v1.8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        body { background-color: #050a18; color: #f8fafc; font-family: sans-serif; }
        #cube-wrapper { width: 100%; max-width: 310px; margin: 0 auto; aspect-ratio: 1; background: #000; border-radius: 20px; border: 1px solid #1e293b; overflow: hidden; }
        twisty-player { width: 100%; height: 100%; }

        /* きちんとしたタブページUI */
        .tab-wrapper { display: flex; gap: 4px; padding: 0 8px; }
        .tab-btn { 
            @apply py-2 px-6 text-[10px] font-black uppercase transition-all;
            background: #1e293b;
            color: #64748b;
            border-radius: 12px 12px 0 0 !important; /* 上側だけ丸く */
            border: 1px solid #1e293b;
            border-bottom: none;
            margin-bottom: -1px; /* 下のパネルと重ねる */
            z-index: 1;
        }
        .tab-btn.active { 
            background: #0f172a !important; /* パネルと同じ色に */
            color: #3b82f6 !important;
            border-color: #1e293b !important;
            z-index: 10;
            padding-bottom: 10px; /* 少し高くして重なりを強調 */
        }

        .tab-content-panel { 
            background: #0f172a; 
            border: 1px solid #1e293b; 
            border-radius: 0 15px 15px 15px; /* 左上以外を丸く */
            padding: 1.25rem;
            position: relative;
            z-index: 5;
        }

        /* 共通ボタン設定 */
        button:not(.tab-btn) { border-radius: 10px !important; }
        .hash-container { background: #000; border: 1px solid #1e293b; border-radius: 12px; display: flex; align-items: center; padding: 4px; }
        .hash-input { background: transparent; color: #10b981; font-family: monospace; font-size: 10px; flex: 1; border: none; outline: none; padding-left: 10px; }
        .panel-card { background: #0f172a88; border: 1px solid #1e293b; border-radius: 20px; padding: 1.25rem; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1000px] mx-auto space-y-4">
        <header class="flex justify-between items-center">
            <div class="flex items-baseline gap-2">
                <h1 class="text-xl font-black text-emerald-500 italic">KAZCUBE Lab</h1>
                <span class="text-[9px] text-slate-600 font-bold">v1.8.0</span>
            </div>
            <div class="flex gap-4 items-center">
                <div class="flex bg-slate-900 p-1 rounded-full border border-slate-800">
                    <button class="px-3 py-1 text-[9px] font-bold rounded-full bg-blue-600">JP</button>
                    <button class="px-3 py-1 text-[9px] font-bold rounded-full ml-1">EN</button>
                </div>
                <div class="flex gap-2">
                    <button id="mode-rotate" class="px-5 py-2 bg-emerald-500 font-black text-[10px] uppercase rounded-lg">Rotate</button>
                    <button id="mode-paint" class="px-5 py-2 bg-slate-800 text-slate-500 font-black text-[10px] uppercase rounded-lg">Paint</button>
                </div>
            </div>
        </header>

        <div class="hash-container">
            <span class="text-[9px] font-black text-slate-500 px-2">HASH</span>
            <input id="hash-display" class="hash-input" readonly value="v5:ready...">
            <div class="flex gap-1">
                <button id="btn-copy" class="bg-indigo-600 text-[9px] font-black px-3 py-2 uppercase">Copy Link</button>
                <button id="btn-import" class="bg-slate-700 text-[9px] font-black px-3 py-2 uppercase">Import</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div id="cube-wrapper">
                    <twisty-player id="main-cube" puzzle="3x3x3" background="none" control-panel="none"></twisty-player>
                </div>
                <div class="panel-card space-y-4">
                    <input type="range" id="move-slider" min="0" max="0" value="0" class="w-full h-1.5 bg-slate-800 rounded-lg accent-emerald-500">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-500">STEP <span id="step-counter" class="text-emerald-500 text-lg ml-1">0</span></span>
                        <div id="move-indicator" class="bg-black border border-slate-800 px-6 py-2 rounded-xl font-mono text-emerald-400 font-bold italic">---</div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="panel-card space-y-4">
                    <textarea id="command-box" class="w-full h-24 bg-black/40 text-emerald-400 p-4 rounded-xl font-mono text-xs border border-slate-800 outline-none resize-none" placeholder="手順を入力..."></textarea>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-scramble" class="bg-indigo-600 py-3 font-black text-[11px] uppercase">Scramble</button>
                        <button id="btn-setup" class="bg-slate-800 border border-amber-500/30 text-amber-500 py-3 font-black text-[11px] uppercase">Set Setup</button>
                    </div>
                    <button id="btn-reset" class="w-full bg-rose-600 py-3 font-black text-[11px] uppercase">Reset All Data</button>
                </div>

                <div>
                    <div class="tab-wrapper">
                        <button class="tab-btn active" data-tab="basic">Basic</button>
                        <button class="tab-btn" data-tab="wide">Wide</button>
                        <button class="tab-btn" data-tab="slice">Slice</button>
                    </div>
                    <div class="tab-content-panel">
                        <div id="move-grid" class="grid grid-cols-6 gap-2">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js" type="module"></script>
</body>
</html>
