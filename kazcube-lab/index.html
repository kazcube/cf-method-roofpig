<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZCUBE Lab - v2.5.5 [UI Optimized]</title>
    <!-- External Libraries -->
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; overflow: hidden; font-family: sans-serif; }
        .no-select { user-select: none; -webkit-tap-highlight-color: transparent; }
        twisty-player { 
            width: 100%; height: 100%; max-width: 500px; max-height: 500px; 
            --twisty-frame-background: none; 
        }
        #main-cube { filter: drop-shadow(0 25px 50px rgb(0 0 0 / 0.6)); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input[type="range"] { accent-color: #10b981; }
        
        .tab-active { color: #10b981; border-bottom: 2px solid #10b981; }
    </style>
</head>
<body class="h-screen flex flex-col no-select">

    <!-- Header -->
    <header class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-900/95 backdrop-blur-md z-30 shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-2 h-6 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
            <h1 class="text-sm font-black tracking-tighter text-slate-200 uppercase">KAZCUBE <span class="text-emerald-500 font-extrabold">LAB</span></h1>
        </div>
        <div class="text-[10px] font-mono text-slate-500 tracking-widest uppercase">v2.5.5 UI Optimized</div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row min-h-0 overflow-hidden">
        <!-- Left: Visualization Section -->
        <section class="flex-[1.2] relative flex flex-col items-center justify-center p-4 bg-slate-900/20 border-r border-slate-800/50">
            
            <!-- Hash Display & Actions at Top -->
            <div class="absolute top-4 z-20 w-full px-6 flex flex-col items-center gap-2">
                <div class="flex items-center gap-1.5 w-full max-w-lg bg-slate-950/80 p-1 rounded-xl border border-slate-800 backdrop-blur-md">
                    <input type="text" id="hash-display" readonly class="flex-1 bg-transparent px-3 py-1.5 text-[9px] font-mono text-slate-600 focus:outline-none transition-all" value="---">
                    <div class="flex gap-1 pr-1">
                        <button id="btn-copy-hash" title="Copy Raw Data" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 font-black text-[9px] rounded-lg transition-all uppercase whitespace-nowrap">Copy</button>
                        <button id="btn-share-url" title="Copy Full URL Link" class="px-3 py-1.5 bg-emerald-700 hover:bg-emerald-600 text-white font-black text-[9px] rounded-lg transition-all uppercase whitespace-nowrap shadow-lg shadow-emerald-900/20">Share</button>
                    </div>
                </div>
                
                <div class="px-8 py-2 bg-slate-900/95 border border-slate-700 rounded-full shadow-xl backdrop-blur-sm min-w-[140px] text-center">
                    <span id="move-indicator" class="text-[12px] font-black text-emerald-400 tracking-[0.2em] uppercase">READY</span>
                </div>
            </div>

            <div class="w-full h-full flex items-center justify-center pt-12">
                <twisty-player id="main-cube" puzzle="3x3x3" camera-latitude="30" camera-longitude="-30" background="none" control-panel="none"></twisty-player>
            </div>

            <!-- Playback Area -->
            <div class="w-full max-w-xl mb-8 px-4">
                <div class="bg-slate-950/80 p-6 rounded-[2.5rem] border border-slate-800/50 flex flex-col gap-4 shadow-2xl backdrop-blur-md">
                    <div class="flex items-center gap-4 px-2">
                        <span class="text-[10px] font-mono text-slate-500 w-8 text-center uppercase tracking-tighter">Start</span>
                        <input type="range" id="move-slider" min="0" max="0" value="0" class="flex-1 h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                        <span class="text-[10px] font-mono text-emerald-500 w-8 text-center font-bold"><span id="step-counter">0</span></span>
                    </div>

                    <div class="flex items-center justify-between gap-2">
                        <div class="flex gap-2">
                            <button id="nav-first" class="w-10 h-10 flex items-center justify-center bg-slate-900 border border-slate-800 rounded-xl text-slate-400 hover:text-white transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17-5-5 5-5M18 17l-5-5 5-5"/></svg>
                            </button>
                            <button id="nav-prev" class="w-10 h-10 flex items-center justify-center bg-slate-900 border border-slate-800 rounded-xl text-slate-400 hover:text-white transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </button>
                        </div>

                        <button id="play-btn" class="w-16 h-16 flex items-center justify-center bg-emerald-600 rounded-3xl text-white hover:bg-emerald-500 active:scale-95 transition-all shadow-xl shadow-emerald-900/20">
                            <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>

                        <div class="flex gap-2">
                            <button id="nav-next" class="w-10 h-10 flex items-center justify-center bg-slate-900 border border-slate-800 rounded-xl text-slate-400 hover:text-white transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                            <button id="nav-last" class="w-10 h-10 flex items-center justify-center bg-slate-900 border border-slate-800 rounded-xl text-slate-400 hover:text-white transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m13 17 5-5-5-5M6 17l5-5-5-5"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right: Control Section -->
        <section class="flex-1 bg-slate-900/40 p-6 md:p-8 overflow-y-auto custom-scroll border-t md:border-t-0 border-slate-800">
            <div class="max-w-md mx-auto space-y-10 pb-12">
                
                <!-- Main Mode Switcher -->
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-2xl shadow-xl flex items-center justify-between min-h-[64px]">
                    <div class="flex p-1 gap-1 bg-slate-950 rounded-xl border border-slate-800/50">
                        <button id="mode-rotate" class="px-5 py-2.5 bg-emerald-500 font-black text-[10px] rounded-lg text-white shadow-lg transition-all uppercase">Rotate</button>
                        <button id="mode-paint" class="px-5 py-2.5 text-slate-500 font-black text-[10px] rounded-lg hover:text-white transition-all uppercase">Paint</button>
                    </div>
                    <div id="paint-controls" class="hidden flex-1 flex items-center justify-end gap-3 px-3">
                        <div class="flex gap-1.5 border-r border-slate-800 pr-3">
                            <button id="btn-gray" class="px-2 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-[9px] font-black text-slate-300 uppercase">Gray</button>
                            <button id="btn-full" class="px-2 py-1.5 bg-emerald-900/60 hover:bg-emerald-800 rounded text-[9px] font-black text-emerald-300 border border-emerald-500/30 uppercase">Full</button>
                        </div>
                        <div id="swatch-container" class="grid grid-cols-4 gap-2"></div>
                    </div>
                </div>

                <!-- Tabbed Rotation Panel -->
                <div id="rotate-panel" class="space-y-4">
                    <div class="flex items-center gap-4 border-b border-slate-800 pb-1">
                        <button data-tab="basic" class="move-tab tab-active px-2 py-1 text-[10px] font-black uppercase tracking-widest transition-all">Basic</button>
                        <button data-tab="wide" class="move-tab px-2 py-1 text-slate-500 text-[10px] font-black uppercase tracking-widest transition-all">Wide</button>
                        <button data-tab="slice" class="move-tab px-2 py-1 text-slate-500 text-[10px] font-black uppercase tracking-widest transition-all">Slice/Rot</button>
                    </div>
                    
                    <div id="grid-basic" class="move-grid-content grid grid-cols-6 gap-2"></div>
                    <div id="grid-wide" class="move-grid-content hidden grid grid-cols-6 gap-2"></div>
                    <div id="grid-slice" class="move-grid-content hidden grid grid-cols-6 gap-2"></div>
                </div>

                <!-- Algorithm Setup -->
                <div class="space-y-5">
                    <div class="flex items-center justify-between pl-1">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Algorithm / Setup</h3>
                        <div class="h-[1px] flex-1 bg-slate-800 ml-4"></div>
                    </div>
                    
                    <div class="space-y-3">
                        <div class="flex flex-col gap-2">
                            <label class="text-[9px] font-bold text-slate-600 uppercase ml-1">Setup Moves (Fixed State)</label>
                            <div class="flex gap-2">
                                <input type="text" id="setup-box" placeholder="R U R' U' ..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm font-mono text-slate-400 placeholder:text-slate-800 focus:outline-none focus:ring-1 focus:ring-slate-700">
                                <button id="setup-btn" class="px-5 bg-slate-800 text-slate-200 font-black text-[10px] rounded-xl hover:bg-slate-700 active:scale-95 transition-all">SET</button>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-[9px] font-bold text-emerald-900 uppercase ml-1">Main Algorithm (Animated)</label>
                            <div class="flex gap-2">
                                <input type="text" id="command-box" placeholder="R U R' U' ..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 text-sm font-mono text-emerald-400 placeholder:text-slate-800 focus:outline-none focus:ring-1 focus:ring-emerald-500/50 shadow-inner">
                                <button id="apply-btn" class="px-5 bg-emerald-600 text-white font-black text-[10px] rounded-xl hover:bg-emerald-500 active:scale-95 transition-all shadow-lg">APPLY</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <button id="scramble-btn" class="py-4 bg-slate-800/40 text-slate-300 font-black text-[10px] rounded-xl border border-slate-700/50 hover:bg-slate-800 uppercase tracking-[0.2em] transition-all">Scramble</button>
                        <button id="reset-btn" class="py-4 bg-slate-800/40 text-rose-400 font-black text-[10px] rounded-xl border border-slate-700/50 hover:bg-rose-950/20 hover:text-rose-300 transition-all uppercase tracking-[0.2em]">Reset All</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        // --- GLOBAL STATE ---
        let activeMoves = [];
        let setupMoves = "";
        let stickerMask = Array(54).fill(1);
        let isPlaying = false;
        let currentMode = 'rotate';
        let selectedColorIdx = 0;

        let lastAppliedAlg = "";
        let lastAppliedSetup = "";

        const palette = [
            { name: "white", hex: "#ffffff" },
            { name: "yellow", hex: "#facc15" },
            { name: "red", hex: "#ef4444" },
            { name: "orange", hex: "#f97316" },
            { name: "blue", hex: "#3b82f6" },
            { name: "green", hex: "#22c55e" },
            { name: "gray", hex: "#4b5563" }
        ];

        // --- CORE RENDER ---
        function render() {
            const player = document.getElementById('main-cube');
            if (!player) return;

            const mainAlgString = activeMoves.join(" ");
            
            if (lastAppliedAlg !== mainAlgString) {
                player.alg = mainAlgString;
                lastAppliedAlg = mainAlgString;
            }
            if (lastAppliedSetup !== setupMoves) {
                player.setupAlg = setupMoves;
                lastAppliedSetup = setupMoves;
            }

            try {
                const orbits = stickerMask.map(v => v === 1 ? "I" : "-").join("");
                player.experimentalStickeringMaskOrbits = `3x3x3:${orbits}`;
            } catch (e) {}

            const slider = document.getElementById('move-slider');
            const step = parseInt(slider.value) || 0;

            if (!isPlaying) {
                player.experimentalCurrentMoveIndex = step;
            }

            document.getElementById('step-counter').textContent = step;
            const indicator = document.getElementById('move-indicator');
            if (indicator) {
                indicator.textContent = isPlaying ? "PLAYING" : (step > 0 && activeMoves[step - 1] ? activeMoves[step - 1] : "READY");
            }

            syncHash();
        }

        // --- CONTROLS ---
        function stopPlay() {
            const player = document.getElementById('main-cube');
            if (player) player.pause();
            isPlaying = false;
            document.getElementById('play-icon').classList.remove('hidden');
            document.getElementById('pause-icon').classList.add('hidden');
            render();
        }

        function togglePlay() {
            const player = document.getElementById('main-cube');
            if (!player) return;

            if (isPlaying) {
                stopPlay();
            } else {
                const slider = document.getElementById('move-slider');
                if (parseInt(slider.value) >= activeMoves.length) slider.value = 0;

                isPlaying = true;
                document.getElementById('play-icon').classList.add('hidden');
                document.getElementById('pause-icon').classList.remove('hidden');
                player.play();

                const syncLoop = () => {
                    if (!isPlaying) return;
                    const currentIndex = player.experimentalCurrentMoveIndex;
                    slider.value = currentIndex;
                    document.getElementById('step-counter').textContent = currentIndex;
                    
                    if (currentIndex >= activeMoves.length) stopPlay();
                    else requestAnimationFrame(syncLoop);
                };
                requestAnimationFrame(syncLoop);
            }
        }

        function addMove(m) {
            stopPlay();
            activeMoves.push(m);
            const slider = document.getElementById('move-slider');
            slider.max = activeMoves.length;
            slider.value = activeMoves.length;
            document.getElementById('command-box').value = activeMoves.join(" ");
            render();
        }

        function jumpToStep(step) {
            stopPlay();
            const slider = document.getElementById('move-slider');
            slider.value = (step === -1) ? activeMoves.length : step;
            render();
        }

        function stepMove(dir) {
            stopPlay();
            const slider = document.getElementById('move-slider');
            let val = parseInt(slider.value) + dir;
            slider.value = Math.max(0, Math.min(activeMoves.length, val));
            render();
        }

        function handleApply(isSetup) {
            stopPlay();
            if (isSetup) {
                setupMoves = document.getElementById('setup-box').value.trim();
            } else {
                const val = document.getElementById('command-box').value.trim();
                activeMoves = val ? val.split(/\s+/) : [];
                const slider = document.getElementById('move-slider');
                slider.max = activeMoves.length;
                slider.value = 0;
            }
            render();
        }

        function handleScramble() {
            stopPlay();
            const faces = ['U','D','L','R','F','B'], mods = ['', "'", '2'];
            activeMoves = Array.from({length:20}, () => faces[Math.floor(Math.random()*6)] + mods[Math.floor(Math.random()*3)]);
            document.getElementById('command-box').value = activeMoves.join(" ");
            const slider = document.getElementById('move-slider');
            slider.max = activeMoves.length;
            slider.value = 0;
            render();
        }

        function resetAll() {
            activeMoves = [];
            setupMoves = "";
            stickerMask.fill(1);
            isPlaying = false;
            document.getElementById('command-box').value = "";
            document.getElementById('setup-box').value = "";
            const slider = document.getElementById('move-slider');
            slider.max = 0;
            slider.value = 0;
            stopPlay();
            render();
        }

        // --- PAINT TOOL ---
        function initPaintTool() {
            const swatch = document.getElementById('swatch-container');
            swatch.innerHTML = "";
            palette.forEach((color, idx) => {
                const btn = document.createElement('button');
                btn.className = `w-6 h-6 rounded-full border-2 transition-all ${idx === selectedColorIdx ? 'border-white scale-110 shadow-lg' : 'border-transparent opacity-60 hover:opacity-100'}`;
                btn.style.backgroundColor = color.hex;
                btn.onclick = () => {
                    selectedColorIdx = idx;
                    initPaintTool();
                };
                swatch.appendChild(btn);
            });
        }

        function setPaintMode(mode) {
            currentMode = mode;
            const isPaint = mode === 'paint';
            document.getElementById('rotate-panel').classList.toggle('hidden', isPaint);
            document.getElementById('paint-controls').classList.toggle('hidden', !isPaint);
            
            const btnRot = document.getElementById('mode-rotate');
            const btnPnt = document.getElementById('mode-paint');
            
            if (isPaint) {
                btnPnt.className = "px-5 py-2.5 bg-emerald-500 font-black text-[10px] rounded-lg text-white shadow-lg transition-all uppercase";
                btnRot.className = "px-5 py-2.5 text-slate-500 font-black text-[10px] rounded-lg hover:text-white transition-all uppercase";
            } else {
                btnRot.className = "px-5 py-2.5 bg-emerald-500 font-black text-[10px] rounded-lg text-white shadow-lg transition-all uppercase";
                btnPnt.className = "px-5 py-2.5 text-slate-500 font-black text-[10px] rounded-lg hover:text-white transition-all uppercase";
            }
        }

        // --- HASH & SYNC ---
        function syncHash() {
            const state = {
                a: activeMoves,
                s: setupMoves,
                m: stickerMask,
                v: parseInt(document.getElementById('move-slider').value) || 0
            };
            const hashStr = `v6:${btoa(JSON.stringify(state))}`;
            document.getElementById('hash-display').value = hashStr;
            window.history.replaceState(null, null, `#${hashStr}`);
        }

        function loadFromHash() {
            const hash = window.location.hash.substring(1);
            if (!hash.startsWith('v6:')) return;
            try {
                const decoded = JSON.parse(atob(hash.substring(3)));
                activeMoves = decoded.a || [];
                setupMoves = decoded.s || "";
                stickerMask = decoded.m || Array(54).fill(1);
                
                const slider = document.getElementById('move-slider');
                slider.max = activeMoves.length;
                slider.value = decoded.v || 0;
                
                document.getElementById('setup-box').value = setupMoves;
                document.getElementById('command-box').value = activeMoves.join(" ");
            } catch (e) {
                console.error("Hash load failed", e);
            }
        }

        async function copyLink() {
            const url = window.location.href;
            try {
                await navigator.clipboard.writeText(url);
                const btn = document.getElementById('btn-share-url');
                const oldText = btn.textContent;
                btn.textContent = "DONE";
                btn.classList.replace("bg-emerald-700", "bg-emerald-500");
                setTimeout(() => {
                    btn.textContent = oldText;
                    btn.classList.replace("bg-emerald-500", "bg-emerald-700");
                }, 2000);
            } catch (err) {}
        }

        // --- TAB LOGIC ---
        function initTabs() {
            const tabButtons = document.querySelectorAll('.move-tab');
            const gridContents = document.querySelectorAll('.move-grid-content');

            tabButtons.forEach(btn => {
                btn.onclick = () => {
                    const target = btn.getAttribute('data-tab');
                    tabButtons.forEach(b => {
                        b.classList.remove('tab-active', 'text-emerald-500');
                        b.classList.add('text-slate-500');
                    });
                    btn.classList.add('tab-active');
                    btn.classList.remove('text-slate-500');
                    gridContents.forEach(content => {
                        content.classList.toggle('hidden', content.id !== `grid-${target}`);
                    });
                };
            });
        }

        function populateMoveGrids() {
            const sets = {
                basic: ["U","D","L","R","F","B","U'","D'","L'","R'","F'","B'","U2","D2","L2","R2","F2","B2"],
                wide: ["u","d","l","r","f","b","u'","d'","l'","r'","f'","b'","u2","d2","l2","r2","f2","b2"],
                slice: ["E","M","S","E'","M'","S'","x","y","z","x'","y'","z'","x2","y2","z2"]
            };

            Object.entries(sets).forEach(([key, moves]) => {
                const container = document.getElementById(`grid-${key}`);
                container.innerHTML = "";
                moves.forEach(m => {
                    const btn = document.createElement('button');
                    btn.className = "py-2 bg-slate-800/60 text-slate-100 font-bold text-[10px] rounded-lg border border-slate-700/50 hover:bg-slate-700 transition-all active:scale-90";
                    btn.textContent = m;
                    btn.onclick = () => addMove(m);
                    container.appendChild(btn);
                });
            });
        }

        function initApp() {
            console.log("KAZCUBE Lab v2.5.5 Initializing...");

            populateMoveGrids();
            initTabs();

            document.getElementById('mode-rotate').onclick = () => setPaintMode('rotate');
            document.getElementById('mode-paint').onclick = () => setPaintMode('paint');
            document.getElementById('play-btn').onclick = togglePlay;
            document.getElementById('scramble-btn').onclick = handleScramble;
            document.getElementById('reset-btn').onclick = resetAll;
            document.getElementById('setup-btn').onclick = () => handleApply(true);
            document.getElementById('apply-btn').onclick = () => handleApply(false);
            
            document.getElementById('nav-first').onclick = () => jumpToStep(0);
            document.getElementById('nav-last').onclick = () => jumpToStep(-1);
            document.getElementById('nav-prev').onclick = () => stepMove(-1);
            document.getElementById('nav-next').onclick = () => stepMove(1);

            document.getElementById('btn-gray').onclick = () => { stickerMask.fill(0); render(); };
            document.getElementById('btn-full').onclick = () => { stickerMask.fill(1); render(); };

            document.getElementById('btn-copy-hash').onclick = () => {
                const hash = document.getElementById('hash-display').value;
                navigator.clipboard.writeText(hash);
                const btn = document.getElementById('btn-copy-hash');
                btn.textContent = "DONE";
                setTimeout(() => btn.textContent = "Copy", 1500);
            };
            document.getElementById('btn-share-url').onclick = copyLink;

            const slider = document.getElementById('move-slider');
            slider.oninput = () => { stopPlay(); render(); };

            const player = document.getElementById('main-cube');
            player.addEventListener('twisty-sticker-click', (e) => {
                if (currentMode !== 'paint') return;
                const idx = e.detail.stickerIndex;
                if (idx !== undefined) {
                    stickerMask[idx] = (palette[selectedColorIdx].name === 'gray') ? 0 : 1;
                    render();
                }
            });

            initPaintTool();
            loadFromHash();
            setTimeout(() => render(), 500);
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
