<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZCUBE Lab - Side-by-Side Fixed</title>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; overflow: hidden; font-family: sans-serif; }
        .no-select { user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* キューブ表示エリアの固定 */
        twisty-player { 
            width: 100%; 
            height: 100%; 
            max-width: 480px; 
            max-height: 480px; 
            --twisty-frame-background: none; 
        }
        #main-cube { filter: drop-shadow(0 25px 50px rgb(0 0 0 / 0.6)); }

        /* カスタムスクロールバー */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        input[type="range"] { accent-color: #10b981; }
    </style>
</head>
<body class="h-screen flex flex-col no-select">

    <!-- Header -->
    <header class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-900/90 backdrop-blur-md z-30 shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-2 h-6 bg-emerald-500 rounded-full"></div>
            <h1 class="text-sm font-black tracking-tighter text-slate-200 uppercase">KAZCUBE <span class="text-emerald-500 font-extrabold">LAB</span></h1>
        </div>
        <div class="text-[10px] font-mono text-slate-500 tracking-widest">v2.1.1</div>
    </header>

    <!-- Main Content (Side-by-Side Layout) -->
    <main class="flex-1 flex flex-col md:flex-row min-h-0 overflow-hidden">
        
        <!-- Left: Cube & Timeline Area -->
        <section class="flex-[1.2] relative flex flex-col items-center justify-center p-4 bg-slate-900/20 border-r border-slate-800/50">
            <!-- Move Indicator -->
            <div class="absolute top-8 z-10">
                <div class="px-6 py-2 bg-slate-900/95 border border-slate-700 rounded-full shadow-2xl backdrop-blur-sm min-w-[100px] text-center">
                    <span id="move-indicator" class="text-[12px] font-black text-emerald-400 tracking-[0.2em] uppercase">READY</span>
                </div>
            </div>

            <div class="w-full h-full flex items-center justify-center">
                <twisty-player 
                    id="main-cube"
                    puzzle="3x3x3"
                    camera-latitude="30"
                    camera-longitude="-30"
                    background="none"
                    control-panel="none"
                    hint-stickers="none"
                ></twisty-player>
            </div>

            <!-- Bottom Slider (Integrated with Cube Area) -->
            <div class="w-full max-w-md mb-8">
                <div class="bg-slate-950/80 p-4 rounded-3xl border border-slate-800/50 flex items-center gap-5 shadow-2xl">
                    <button id="play-btn" class="w-12 h-12 flex items-center justify-center bg-emerald-600 rounded-2xl text-white hover:bg-emerald-500 active:scale-95 shadow-lg shadow-emerald-900/20 transition-all">
                        <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <div class="flex-1 space-y-1">
                        <div class="flex justify-between text-[10px] font-black text-slate-500 tracking-widest uppercase">
                            <span>Step <span id="step-counter" class="text-emerald-500">0</span></span>
                            <span>Progress</span>
                        </div>
                        <input type="range" id="move-slider" min="0" max="0" value="0" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>
        </section>

        <!-- Right: Operation Panel -->
        <section class="flex-1 bg-slate-900/40 p-6 overflow-y-auto custom-scroll">
            <div class="max-w-md mx-auto space-y-8 pb-10">
                
                <!-- 1. Mode Switcher & Paint Tools -->
                <div class="bg-slate-900 border border-slate-800 p-1.5 rounded-2xl shadow-xl flex items-center justify-between min-h-[64px]">
                    <div class="flex p-1 gap-1 bg-slate-950 rounded-xl border border-slate-800/50">
                        <button id="mode-rotate" class="px-5 py-2.5 bg-emerald-500 font-black text-[10px] rounded-lg text-white shadow-lg transition-all">ROTATE</button>
                        <button id="mode-paint" class="px-5 py-2.5 text-slate-500 font-black text-[10px] rounded-lg hover:text-white transition-all">PAINT</button>
                    </div>
                    
                    <!-- Integrated Paint Tools -->
                    <div id="paint-controls" class="hidden flex-1 flex items-center justify-end gap-3 px-3">
                        <div class="flex gap-1 border-r border-slate-800 pr-3">
                            <button id="btn-gray" class="px-2 py-1.5 bg-slate-800 hover:bg-slate-700 rounded text-[9px] font-black text-slate-300">GRAY</button>
                            <button id="btn-cc" class="px-2 py-1.5 bg-indigo-900/60 hover:bg-indigo-800 rounded text-[9px] font-black text-indigo-300 border border-indigo-500/30">C+C</button>
                            <button id="btn-full" class="px-2 py-1.5 bg-emerald-900/60 hover:bg-emerald-800 rounded text-[9px] font-black text-emerald-300 border border-emerald-500/30">FULL</button>
                        </div>
                        <div id="swatch-container" class="flex gap-1.5"></div>
                    </div>
                </div>

                <!-- 2. Rotation Grid Panel -->
                <div id="rotate-panel" class="space-y-4">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] pl-1">Move Controls</h3>
                    <div id="move-grid" class="grid grid-cols-6 gap-2">
                        <!-- JS injects 18 buttons -->
                    </div>
                </div>

                <!-- 3. Command & Setup Panel -->
                <div class="space-y-4">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] pl-1">Alg / Setup</h3>
                    <div class="flex gap-2">
                        <input type="text" id="command-box" placeholder="Algorithm (e.g. R U R' U')..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3.5 text-sm font-mono text-emerald-400 placeholder:text-slate-800 focus:outline-none focus:ring-1 focus:ring-emerald-500/50">
                        <button id="apply-btn" class="px-5 bg-slate-200 text-slate-900 font-black text-[10px] rounded-xl hover:bg-white active:scale-95 shadow-lg">APPLY</button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button id="scramble-btn" class="py-4 bg-slate-800/40 text-slate-300 font-black text-[10px] rounded-xl border border-slate-700/50 hover:bg-slate-800 transition uppercase tracking-widest">Scramble</button>
                        <button id="reset-btn" class="py-4 bg-slate-800/40 text-rose-400 font-black text-[10px] rounded-xl border border-slate-700/50 hover:bg-slate-800 transition uppercase tracking-widest">Reset Cube</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="p-2 border-t border-slate-800/50 bg-slate-900 shrink-0">
        <input type="text" id="hash-display" readonly class="w-full bg-transparent text-[9px] font-mono text-slate-800 border-none focus:outline-none text-center" value="---">
    </footer>

    <script type="module">
        import { initApp } from './js/app.js?v=2.1.1';
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
