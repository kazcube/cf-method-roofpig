<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZCUBE Lab v1.7.4 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        #cube-wrapper { width: 100%; max-width: 360px; margin: 0 auto; aspect-ratio: 1; background: #000; border-radius: 1.5rem; border: 4px solid #334155; overflow: hidden; position: relative; }
        twisty-player { width: 100%; height: 100%; }
        .mode-btn { flex: 1; padding: 10px 0; font-size: 11px; font-weight: 900; border-radius: 10px; cursor: pointer; border: none; }
        .active-rotate { background-color: #10b981 !important; color: white !important; }
        .active-paint { background-color: #f97316 !important; color: white !important; }
        .inactive { background-color: #1e293b !important; color: #64748b !important; }
        .preset-btn { background: #1e293b; border: 1px solid #475569; padding: 8px; border-radius: 6px; font-size: 9px; font-weight: bold; color: #94a3b8; cursor: pointer; }
        /* ユーティリティボタン用 */
        .util-btn { @apply bg-slate-800 hover:bg-slate-700 text-slate-400 text-[9px] px-2 py-1 rounded border border-slate-700 transition-all; }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 p-4">
    <div class="max-w-[900px] mx-auto">
        <header class="mb-6 flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-xl font-black text-emerald-400 italic">KAZCUBE Lab</h1>
            <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800 w-56">
                <button id="mode-rotate" class="mode-btn active-rotate">ROTATE</button>
                <button id="mode-paint" class="mode-btn inactive">PAINT</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div id="cube-wrapper">
                    <twisty-player id="main-cube" puzzle="3x3x3" background="none" control-panel="none"></twisty-player>
                </div>
                <div id="paint-panel" class="hidden bg-slate-800/60 p-5 rounded-2xl border border-orange-500/30 space-y-3">
                    <div class="grid grid-cols-3 gap-2">
                        <button id="btn-mask-gray" class="preset-btn">ALL GRAY</button>
                        <button id="btn-mask-cc" class="preset-btn">C+CORNER</button>
                        <button id="btn-mask-full" class="preset-btn">FULL</button>
                    </div>
                </div>
                <div id="rotate-panel" class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                    <input type="range" id="move-slider" min="0" max="0" value="0" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    <div class="flex justify-between font-mono text-xs mt-3">
                        <span class="text-slate-500 uppercase">Step <span id="step-counter" class="text-emerald-500 font-bold">0</span></span>
                        <span id="move-indicator" class="text-emerald-400 italic font-bold">---</span>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Algorithm / Setup (#)</label>
                    <div class="flex gap-1">
                        <button id="btn-copy" class="util-btn">COPY</button>
                        <button id="btn-paste" class="util-btn">PASTE</button>
                        <button id="btn-clear" class="util-btn">CLEAR</button>
                    </div>
                </div>
                <textarea id="command-box" class="w-full h-28 bg-black/60 text-emerald-400 p-4 rounded-xl font-mono text-xs border border-slate-700 outline-none resize-none shadow-inner" placeholder="R U R' U' ... (Prefix with # for Setup)"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-scramble" class="bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-black text-xs uppercase transition">Scramble</button>
                    <button id="btn-setup" class="bg-amber-600 hover:bg-amber-500 py-3 rounded-xl font-black text-xs uppercase transition text-white">Set Setup (#)</button>
                </div>
                
                <button id="btn-reset" class="w-full bg-slate-800 hover:bg-rose-900/40 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500 hover:text-rose-400 border border-slate-700 transition">
                    Reset All Data & Reload
                </button>
                
                <div id="move-grid" class="grid grid-cols-6 gap-2 pt-2"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js" type="module"></script>
</body>
</html>
