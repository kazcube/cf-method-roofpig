<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZCUBE Lab - GitHub Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        .main-grid { display: flex; gap: 20px; align-items: start; justify-content: center; }
        #cube-wrapper { width: 100%; height: 380px; background: #000; border-radius: 1.5rem; border: 4px solid #334155; overflow: hidden; }
        twisty-player { width: 100%; height: 100%; }
        .move-btn { background-color: #334155; color: white; padding: 14px 0; border-radius: 8px; font-family: monospace; font-size: 14px; font-weight: bold; border: 1px solid #475569; cursor: pointer; }
        .move-btn:hover { background-color: #475569; }
        .move-btn:active { background-color: #3b82f6; transform: scale(0.9); }
        .hash-io { background: #000; color: #10b981; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 6px; border: 1px solid #334155; flex: 1; }
        @media (max-width: 850px) { .main-grid { flex-direction: column; } }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 p-4">

    <div class="max-w-[1000px] mx-auto">
        <header class="mb-6 border-b border-slate-700 pb-4 text-center">
            <h2 class="text-2xl font-black text-emerald-400 italic">KAZCUBE Lab <span class="text-xs text-white not-italic ml-2 uppercase">v1.2.1 Stable</span></h2>
        </header>

        <div class="bg-slate-800 p-3 rounded-xl border border-slate-700 flex gap-3 items-center mb-6">
            <input type="text" id="hash-io" class="hash-io" readonly placeholder="Waiting...">
            <button onclick="window.copyLink()" class="bg-indigo-600 px-4 py-2 rounded text-[10px] font-black uppercase">Copy URL</button>
        </div>

        <div class="main-grid">
            <div class="flex-1">
                <div id="cube-wrapper">
                     <twisty-player id="main-cube" puzzle="3x3x3" background="none" control-panel="none"></twisty-player>
                </div>
            </div>

            <div class="w-full lg:w-[350px] space-y-4">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <div id="move-grid" class="grid grid-cols-4 gap-2">
                        </div>
                </div>
                <button onclick="location.reload()" class="w-full py-3 bg-slate-700 rounded-lg text-xs font-black uppercase">Reset</button>
            </div>
        </div>
    </div>

    <script type="module">
        // 以前動いていた v5.44 の「履歴蓄積方式」を採用
        let moveHistory = [];
        const player = document.getElementById('main-cube');
        const hashIo = document.getElementById('hash-io');

        // ハッシュ更新
        const syncHash = () => {
            const data = { a: moveHistory };
            hashIo.value = "v1.2:" + btoa(JSON.stringify(data));
        };

        // ボタン生成
        const grid = document.getElementById('move-grid');
        const moves = ['U', "U'", 'D', "D'", 'L', "L'", 'R', "R'", 'F', "F'", 'B', "B'"];
        
        moves.forEach(m => {
            const btn = document.createElement('button');
            btn.className = "move-btn";
            btn.textContent = m;
            btn.onclick = () => {
                moveHistory.push(m);
                // 直接 applyMove を呼ばず、alg属性を更新する（v5.44と同じ方式）
                player.alg = moveHistory.join(" ");
                syncHash();
            };
            grid.appendChild(btn);
        });

        // URLコピー
        window.copyLink = () => {
            const url = `${window.location.origin}${window.location.pathname}?hash=${encodeURIComponent(hashIo.value)}`;
            navigator.clipboard.writeText(url).then(() => alert("URL Copied!"));
        };

        // 初期化：URLから状態復元
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const hash = params.get('hash');
            if (hash && hash.startsWith("v1.2:")) {
                try {
                    const state = JSON.parse(atob(hash.replace("v1.2:", "")));
                    if (state.a) {
                        moveHistory = state.a;
                        player.alg = moveHistory.join(" ");
                    }
                } catch(e) { console.error(e); }
            }
            syncHash();
        });
    </script>
</body>
</html>
