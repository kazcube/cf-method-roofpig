<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KAZCUBE Lab - Phase 1.1.4 (Stable Analysis)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        /* スライダーの見た目を調整 */
        input[type=range]::-webkit-slider-thumb { border: 2px solid #10b981; height: 18px; width: 18px; border-radius: 50%; background: #ffffff; cursor: pointer; -webkit-appearance: none; margin-top: -5px; }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 p-4">
    <div class="max-w-5xl mx-auto bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-2xl">
        <header class="mb-4 flex justify-between items-center border-b border-slate-700 pb-2">
            <div class="flex items-center gap-3">
                <h2 class="text-xl font-black text-emerald-400 italic">KAZCUBE <span class="text-white">Lab</span></h2>
                <span class="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/50 font-bold">v1.1.4</span>
            </div>
            <div id="status" class="text-[10px] font-mono bg-black px-2 py-1 rounded text-emerald-400 uppercase tracking-tighter">READY</div>
        </header>

        <div class="mb-6 p-3 bg-slate-900 rounded-xl border border-slate-700 flex flex-col md:flex-row gap-3 items-center shadow-inner">
            <div class="flex-1 w-full">
                <input type="text" id="hash-io" placeholder="Hash data..." class="w-full bg-black border border-slate-700 rounded px-3 py-2 text-[10px] font-mono text-emerald-500 outline-none focus:border-indigo-500" spellcheck="false">
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button id="btn-copy-url" class="flex-1 md:flex-none px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded text-[10px] font-black uppercase transition-all active:scale-95">Copy Link</button>
                <button id="btn-import" class="flex-1 md:flex-none px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded text-[10px] font-black uppercase transition-all active:scale-95">Import Hash</button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-black rounded-lg aspect-square border border-slate-700 overflow-hidden shadow-lg">
                        <twisty-player id="p1" puzzle="3x3x3" background="checkered" control-panel="none" class="w-full h-full"></twisty-player>
                    </div>
                    <div class="bg-black rounded-lg aspect-square border border-slate-700 overflow-hidden shadow-lg">
                        <twisty-player id="p2" puzzle="3x3x3" background="none" control-panel="none" 
                            experimental-stickering-mask-orbits="EDGES:IIIIIIIIIIII,CORNERS:--------,CENTERS:IIIIII" class="w-full h-full"></twisty-player>
                    </div>
                </div>

                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 space-y-3 shadow-inner">
                    <div class="flex justify-between text-xs font-mono text-emerald-500 font-bold">
                        <span>STEP: <span id="step-counter">0</span></span>
                        <span id="move-indicator" class="bg-emerald-500/10 px-2 rounded tracking-widest">---</span>
                    </div>
                    <input type="range" id="move-slider" min="0" max="0" value="0" step="1" 
                           class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    <div class="bg-black/50 p-2 rounded text-[10px] font-mono text-slate-400 break-all min-h-[2.5rem] border border-slate-800" id="alg-display">Ready.</div>
                </div>
                
                <div class="flex gap-2">
                    <button id="btn-play" class="flex-[3] bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black text-white shadow-lg transition-all active:scale-95 disabled:opacity-50 uppercase tracking-widest" disabled>再生</button>
                    <button id="btn-reset" class="flex-1 bg-red-900/30 text-red-400 rounded-xl text-xs font-bold border border-red-900/50 hover:bg-red-900/50 transition-colors uppercase">Reset</button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-1" id="button-grid"></div>
                <div class="pt-4 border-t border-slate-700">
                    <button id="btn-setup" class="w-full py-4 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-xl font-black text-base shadow-xl active:scale-95 transition-all">
                        上記の手順でセットアップ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const p1 = document.getElementById('p1');
        const p2 = document.getElementById('p2');
        const algDisplay = document.getElementById('alg-display');
        const status = document.getElementById('status');
        const playBtn = document.getElementById('btn-play');
        const slider = document.getElementById('move-slider');
        const stepCounter = document.getElementById('step-counter');
        const moveIndicator = document.getElementById('move-indicator');
        const buttonGrid = document.getElementById('button-grid');
        const hashIo = document.getElementById('hash-io');

        let recordedMoves = []; 
        let baseAlg = "";      
        let isSetupMode = false;

        // ハッシュ生成関数
        const updateHash = () => {
            const data = { b: baseAlg, r: recordedMoves, s: isSetupMode };
            hashIo.value = "v1:" + btoa(JSON.stringify(data));
        };

        const render = (step) => {
            const currentPlayMoves = recordedMoves.slice(0, step);
            const totalAlg = (baseAlg + " " + currentPlayMoves.join(" ")).trim();
            
            p1.alg = totalAlg;
            p2.alg = totalAlg;
            
            slider.value = step;
            stepCounter.textContent = step;
            moveIndicator.textContent = step > 0 ? recordedMoves[step - 1] : "---";
            
            if (!isSetupMode) {
                algDisplay.textContent = recordedMoves.join(" ");
            }
            updateHash(); // 操作のたびにハッシュを更新
        };

        const handleInput = (move) => {
            const currentStep = parseInt(slider.value);
            if (isSetupMode) {
                recordedMoves = recordedMoves.slice(0, currentStep);
            }
            recordedMoves.push(move);
            slider.max = recordedMoves.length;
            render(recordedMoves.length);
        };

        slider.oninput = () => render(parseInt(slider.value));

        let playInterval = null;
        playBtn.onclick = () => {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
                playBtn.textContent = "再開";
                playBtn.classList.replace('bg-orange-600', 'bg-emerald-600');
            } else {
                playBtn.textContent = "停止";
                playBtn.classList.replace('bg-emerald-600', 'bg-orange-600');
                playInterval = setInterval(() => {
                    let current = parseInt(slider.value);
                    if (current < recordedMoves.length) {
                        render(current + 1);
                    } else {
                        clearInterval(playInterval);
                        playInterval = null;
                        playBtn.textContent = "再生";
                        playBtn.classList.replace('bg-orange-600', 'bg-emerald-600');
                    }
                }, 800);
            }
        };

        ['U','D','L','R','F','B','M','E','S'].forEach(f => {
            [f, f+"'", f+"2"].forEach(move => {
                const btn = document.createElement('button');
                btn.className = "p-2 bg-slate-700 hover:bg-emerald-700 rounded text-sm transition-all active:scale-95 shadow font-mono";
                btn.textContent = move;
                btn.onclick = () => handleInput(move);
                buttonGrid.appendChild(btn);
            });
        });

        document.getElementById('btn-setup').onclick = () => {
            if (recordedMoves.length === 0) return;
            const inverse = [...recordedMoves].reverse().map(m => 
                m.endsWith("2") ? m : (m.endsWith("'") ? m.slice(0, -1) : m + "'")
            );

            baseAlg = inverse.join(" ");
            isSetupMode = true;
            slider.max = recordedMoves.length;
            playBtn.disabled = false;
            render(0); 
            status.textContent = "SETUP COMPLETE";
            algDisplay.textContent = "再生準備完了: " + recordedMoves.join(" ");
        };

        document.getElementById('btn-reset').onclick = () => {
            if (playInterval) clearInterval(playInterval);
            playInterval = null;
            baseAlg = ""; recordedMoves = []; isSetupMode = false;
            p1.alg = ""; p2.alg = "";
            slider.value = 0; slider.max = 0;
            playBtn.disabled = true;
            playBtn.textContent = "再生";
            playBtn.className = "flex-[3] bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black text-white shadow-lg transition-all active:scale-95 disabled:opacity-50 uppercase tracking-widest";
            algDisplay.textContent = "Ready.";
            status.textContent = "READY";
            stepCounter.textContent = "0";
            moveIndicator.textContent = "---";
            updateHash();
        };

        // --- 移植部分: 共有機能 ---

        document.getElementById('btn-copy-url').onclick = () => {
            const shareUrl = `${window.location.origin}${window.location.pathname}?hash=${encodeURIComponent(hashIo.value)}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                const btn = document.getElementById('btn-copy-url');
                const old = btn.textContent;
                btn.textContent = "COPIED!";
                setTimeout(() => btn.textContent = old, 1500);
            });
        };

        const importProcess = (hashStr) => {
            try {
                const json = JSON.parse(atob(hashStr.replace("v1:", "")));
                baseAlg = json.b || "";
                recordedMoves = json.r || [];
                isSetupMode = json.s || false;

                slider.max = recordedMoves.length;
                if (isSetupMode) {
                    playBtn.disabled = false;
                    status.textContent = "IMPORTED: SETUP MODE";
                    algDisplay.textContent = "再生準備完了: " + recordedMoves.join(" ");
                    render(0);
                } else {
                    status.textContent = "IMPORTED: RECORD MODE";
                    render(recordedMoves.length);
                }
            } catch (e) {
                alert("Invalid Hash Format");
            }
        };

        document.getElementById('btn-import').onclick = () => importProcess(hashIo.value);

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const hash = urlParams.get('hash');
            if (hash) {
                hashIo.value = hash;
                importProcess(hash);
            }
        });

    </script>
</body>
</html>
