<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZCUBE Lab - v1.2.1 Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        #cube-wrapper { width: 100%; height: 350px; background: #000; border-radius: 1rem; border: 2px solid #334155; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        twisty-player { width: 100%; height: 100%; }
        .move-btn { background: #1e293b; color: white; padding: 12px 0; border-radius: 8px; font-family: monospace; font-weight: bold; border: 1px solid #475569; text-align: center; cursor: pointer; }
        .move-btn:active { background: #3b82f6; transform: scale(0.95); }
        .hash-io { width: 100%; background: #000; color: #10b981; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
    </style>
</head>
<body class="bg-slate-900 text-white p-4">

    <div class="max-w-md mx-auto space-y-4">
        <h1 class="text-xl font-black text-emerald-400 italic">KAZCUBE Lab v1.2.1</h1>

        <div id="cube-wrapper">
            <twisty-player id="main-cube" puzzle="3x3x3" background="none" control-panel="none"></twisty-player>
        </div>

        <div class="grid grid-cols-4 gap-2">
            <button class="move-btn" onclick="applyMove('U')">U</button>
            <button class="move-btn" onclick="applyMove('U\'')">U'</button>
            <button class="move-btn" onclick="applyMove('D')">D</button>
            <button class="move-btn" onclick="applyMove('D\'')">D'</button>
            <button class="move-btn" onclick="applyMove('L')">L</button>
            <button class="move-btn" onclick="applyMove('L\'')">L'</button>
            <button class="move-btn" onclick="applyMove('R')">R</button>
            <button class="move-btn" onclick="applyMove('R\'')">R'</button>
            <button class="move-btn" onclick="applyMove('F')">F</button>
            <button class="move-btn" onclick="applyMove('F\'')">F'</button>
            <button class="move-btn" onclick="applyMove('B')">B</button>
            <button class="move-btn" onclick="applyMove('B\'')">B'</button>
        </div>

        <div class="p-4 bg-slate-800 rounded-xl border border-slate-700 space-y-3">
            <input type="text" id="hash-io" class="hash-io" readonly>
            <button onclick="copyURL()" class="w-full bg-indigo-600 p-3 rounded font-black text-xs uppercase">Copy Share URL</button>
        </div>
    </div>

    <script type="module">
        const player = document.getElementById('main-cube');
        const hashIo = document.getElementById('hash-io');
        let moveHistory = [];

        // グローバルに関数を公開（HTMLのonclickから呼べるようにする）
        window.applyMove = (m) => {
            moveHistory.push(m);
            // v5.44で実績のある .alg 直接代入方式
            player.alg = moveHistory.join(" ");
            updateHash();
        };

        const updateHash = () => {
            const data = { a: moveHistory };
            hashIo.value = "v1.2:" + btoa(JSON.stringify(data));
        };

        window.copyURL = () => {
            const url = `${window.location.origin}${window.location.pathname}?hash=${encodeURIComponent(hashIo.value)}`;
            navigator.clipboard.writeText(url).then(() => alert("Copied!"));
        };

        // 初期ロード処理
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const hash = params.get('hash');
            if (hash && hash.startsWith("v1.2:")) {
                try {
                    const state = JSON.parse(atob(hash.replace("v1.2:", "")));
                    if (state.a) {
                        moveHistory = state.a;
                        player.alg = moveHistory.join(" ");
                    }
                } catch(e) {}
            }
            updateHash();
        });
    </script>
</body>
</html>
