<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZCUBE Lab - v1.4.2 Paint Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        .main-grid { display: flex; gap: 24px; align-items: start; justify-content: center; }
        .left-col { flex: 1; min-width: 300px; }
        .right-col { width: 380px; min-width: 380px; display: flex; flex-direction: column; gap: 16px; }
        #cube-wrapper { width: 100%; height: 380px; background: #000; border-radius: 1.5rem; border: 4px solid #334155; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        twisty-player { width: 100%; height: 100%; }
        
        /* モード切替スイッチ */
        .mode-switch { display: flex; background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 4px; gap: 4px; }
        .mode-btn { flex: 1; padding: 8px; border-radius: 8px; font-weight: 900; font-size: 12px; transition: 0.2s; color: #94a3b8; }
        .mode-btn.active { background: #3b82f6; color: white; }

        /* カラーパレット */
        .color-palette { display: flex; gap: 8px; justify-content: center; padding: 12px; background: #1e293b; border-radius: 12px; margin-top: 12px; }
        .color-chip { width: 32px; height: 32px; border-radius: 6px; border: 2px solid #475569; cursor: pointer; transition: 0.2s; }
        .color-chip.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        /* UIパーツ */
        .share-panel { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 8px 12px; display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
        .hash-io { background: #000; color: #10b981; font-family: monospace; font-size: 10px; padding: 6px 10px; border-radius: 6px; border: 1px solid #334155; flex: 1; outline: none; }
        .nav-btn { background: #1e293b; border: 1px solid #475569; color: #94a3b8; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .play-btn { background: #059669 !important; color: white !important; width: 56px !important; border: none !important; }
        .action-btn { font-weight: 900; letter-spacing: 0.05em; transition: 0.2s; text-transform: uppercase; border-radius: 0.75rem; }
        .move-btn { background-color: #334155; color: white; padding: 10px 0; border-radius: 6px; font-family: monospace; font-size: 13px; font-weight: bold; border: 1px solid #475569; cursor: pointer; }
        .tab-btn { flex: 1; padding: 8px 0; font-size: 11px; font-weight: 900; border-radius: 6px; color: #94a3b8; cursor: pointer; }
        .tab-btn.active { background-color: #475569; color: white; }
        
        .hidden { display: none !important; }
        @media (max-width: 850px) { .main-grid { flex-direction: column; } .right-col { width: 100%; } }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 p-4">

    <div class="max-w-[1200px] mx-auto">
        <header class="mb-6 border-b border-slate-700 pb-4 flex justify-between items-center">
            <h2 class="text-2xl font-black text-emerald-400 italic uppercase">KAZCUBE Lab <span class="text-xs text-white not-italic ml-2 tracking-widest">v1.4.2 CF</span></h2>
            
            <div class="mode-switch w-48">
                <button id="mode-rotate" onclick="setMode('rotate')" class="mode-btn active">ROTATE</button>
                <button id="mode-paint" onclick="setMode('paint')" class="mode-btn">PAINT</button>
            </div>
        </header>

        <div class="share-panel shadow-lg">
            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Hash</span>
            <input type="text" id="hash-io" class="hash-io" readonly>
            <button onclick="copyLink()" class="bg-indigo-600 text-[10px] font-black px-3 py-1.5 rounded uppercase">Copy Link</button>
        </div>

        <div class="main-grid">
            <div class="left-col space-y-4">
                <div id="cube-wrapper" class="shadow-2xl">
                     <twisty-player id="main-cube" puzzle="3x3x3" background="none" control-panel="none"></twisty-player>
                </div>

                <div id="paint-controls" class="hidden">
                    <div class="color-palette shadow-xl">
                        <div class="color-chip bg-white active" onclick="selectColor('white', this)"></div>
                        <div class="color-chip bg-yellow-400" onclick="selectColor('yellow', this)"></div>
                        <div class="color-chip bg-red-600" onclick="selectColor('red', this)"></div>
                        <div class="color-chip bg-orange-500" onclick="selectColor('orange', this)"></div>
                        <div class="color-chip bg-blue-600" onclick="selectColor('blue', this)"></div>
                        <div class="color-chip bg-green-600" onclick="selectColor('green', this)"></div>
                        <div class="color-chip bg-slate-600" onclick="selectColor('gray', this)" title="Eraser"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-3">
                        <button onclick="applyPreset('corner-center')" class="bg-slate-700 hover:bg-slate-600 text-[10px] font-black py-2 rounded uppercase transition">C + Corner</button>
                        <button onclick="applyPreset('corner-only')" class="bg-slate-700 hover:bg-slate-600 text-[10px] font-black py-2 rounded uppercase transition">Corner Only</button>
                        <button onclick="applyPreset('gray')" class="bg-rose-900/50 hover:bg-rose-800 text-[10px] font-black py-2 rounded uppercase transition border border-rose-500/30 text-rose-200">Reset Gray</button>
                    </div>
                </div>
                
                <div id="rotate-controls" class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-5">
                    <input type="range" id="move-slider" min="0" max="0" value="0" class="w-full h-3 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" oninput="updateView()">
                    <div class="flex justify-center items-center gap-2">
                        <button onclick="navMove('first')" class="nav-btn">&lt;&lt;</button>
                        <button onclick="navMove('prev')" class="nav-btn">&lt;</button>
                        <button id="btn-play" onclick="togglePlay()" class="nav-btn play-btn">▶</button>
                        <button onclick="navMove('next')" class="nav-btn">&gt;</button>
                        <button onclick="navMove('last')" class="nav-btn">&gt;&gt;</button>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="space-y-3">
                    <textarea id="command-box" class="w-full h-24 bg-black text-emerald-400 p-4 rounded-xl font-mono text-sm border-2 border-slate-700 outline-none" placeholder="Enter algorithm..."></textarea>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="handleScramble()" class="action-btn py-4 bg-indigo-600 text-white text-[12px]">Random Scramble</button>
                        <button onclick="applyReverseSetup()" class="action-btn py-4 bg-slate-700 text-amber-400 border-2 border-amber-500/30 text-[12px]">Set Setup</button>
                    </div>
                </div>

                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                    <div class="flex gap-1.5 mb-4 bg-black/30 p-1.5 rounded-lg">
                        <button id="tab-basic" onclick="renderMoves('basic')" class="tab-btn active">BASIC</button>
                        <button id="tab-wide" onclick="renderMoves('wide')" class="tab-btn">WIDE</button>
                        <button id="tab-slice" onclick="renderMoves('slice')" class="tab-btn">SLICE</button>
                    </div>
                    <div id="move-grid" class="grid grid-cols-6 gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        let setupMoves = [];
        let activeMoves = [];
        let isPlaying = false;
        let currentMode = 'rotate';

        /**
         * モード切り替えロジック
         */
        window.setMode = (mode) => {
            currentMode = mode;
            document.getElementById('mode-rotate').classList.toggle('active', mode === 'rotate');
            document.getElementById('mode-paint').classList.toggle('active', mode === 'paint');
            document.getElementById('rotate-controls').classList.toggle('hidden', mode === 'paint');
            document.getElementById('paint-controls').classList.toggle('hidden', mode === 'rotate');

            if (mode === 'paint') {
                applyPreset('gray'); // PAINT切り替え時に即座にグレーアウト
            } else {
                applyPreset('full'); // ROTATEに戻る時は全色復元
            }
        };

        /**
         * コーナーファースト向け表示マスク（Stickering API）
         */
        window.applyPreset = (type) => {
            const player = document.getElementById('main-cube');
            if (!player) return;

            switch(type) {
                case 'gray':
                    // すべてを暗転させる（マスク）
                    player.stickering = "dim";
                    break;
                case 'corner-center':
                    // センターとコーナーのみ表示
                    player.stickering = "centers-corners";
                    break;
                case 'corner-only':
                    // コーナーのみ表示
                    player.stickering = "corners-only";
                    break;
                case 'full':
                default:
                    // 通常表示
                    player.stickering = "full";
                    break;
            }
        };

        /**
         * 描画更新
         */
        window.updateView = () => {
            const player = document.getElementById('main-cube');
            const slider = document.getElementById('move-slider');
            const step = parseInt(slider.value) || 0;
            
            // 初回読み込み時に不必要な手順が入らないよう制御
            const fullAlg = [...setupMoves, ...activeMoves.slice(0, step)].join(" ");
            if (player) player.alg = fullAlg;
        };

        // --- 以下、既存の安定ロジック ---

        window.handleScramble = () => {
            setupMoves = [];
            const faces = ['U','D','L','R','F','B'], mods = ['', "'", '2'];
            activeMoves = Array.from({length:20}, () => faces[Math.floor(Math.random()*6)] + mods[Math.floor(Math.random()*3)]);
            document.getElementById('move-slider').max = activeMoves.length;
            document.getElementById('move-slider').value = activeMoves.length;
            document.getElementById('command-box').value = activeMoves.join(" ");
            updateView();
        };

        window.applyReverseSetup = () => {
            const val = document.getElementById('command-box').value.trim();
            if (!val) return;
            const moves = val.split(/\s+/).filter(m => m.length > 0);
            setupMoves = [...moves].reverse().map(m => m.endsWith("2") ? m : (m.endsWith("'") ? m.slice(0, -1) : m + "'"));
            activeMoves = moves;
            const slider = document.getElementById('move-slider');
            slider.max = activeMoves.length;
            slider.value = 0;
            updateView();
        };

        window.renderMoves = (type) => {
            const grid = document.getElementById('move-grid');
            grid.innerHTML = '';
            const lib = { basic:['U','D','L','R','F','B'], wide:['u','d','l','r','f','b'], slice:['M','E','S','x','y','z'] };
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-'+type));
            lib[type].forEach(f => {
                [f, f+"'", f+"2"].forEach(m => {
                    const b = document.createElement('button');
                    b.className = "move-btn"; b.textContent = m;
                    b.onclick = () => {
                        const slider = document.getElementById('move-slider');
                        activeMoves = activeMoves.slice(0, parseInt(slider.value));
                        activeMoves.push(m);
                        slider.max = activeMoves.length;
                        slider.value = activeMoves.length;
                        document.getElementById('command-box').value = activeMoves.join(" ");
                        updateView();
                    };
                    grid.appendChild(b);
                });
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            renderMoves('basic');
            // 初期状態では何も手順を入れない
            const player = document.getElementById('main-cube');
            player.alg = ""; 
        });
    </script>
</body>
</html>
