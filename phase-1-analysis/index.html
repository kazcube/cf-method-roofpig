<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZCUBE Lab - v1.3.0 Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.cubing.net/v0/js/cubing/twisty" type="module"></script>
    <style>
        .main-grid { display: flex; gap: 24px; align-items: start; justify-content: center; }
        .left-col { flex: 1; min-width: 300px; }
        .right-col { width: 380px; min-width: 380px; display: flex; flex-direction: column; gap: 16px; }
        #cube-wrapper { width: 100%; height: 380px; background: #000; border-radius: 1.5rem; border: 4px solid #334155; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        twisty-player { width: 100%; height: 100%; }
        .nav-btn { background: #1e293b; border: 1px solid #475569; color: #94a3b8; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .play-btn { background: #059669 !important; color: white !important; width: 56px !important; }
        .action-btn { font-weight: 900; letter-spacing: 0.05em; transition: 0.2s; text-transform: uppercase; border-radius: 0.75rem; }
        .move-btn { background-color: #334155; color: white; padding: 10px 0; border-radius: 6px; font-family: monospace; font-size: 13px; font-weight: bold; border: 1px solid #475569; }
        .tab-btn { flex: 1; padding: 8px 0; font-size: 11px; font-weight: 900; border-radius: 6px; color: #94a3b8; }
        .tab-btn.active { background-color: #475569; color: white; }
        @media (max-width: 850px) { .main-grid { flex-direction: column; } .right-col { width: 100%; } }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 p-4">

    <div class="max-w-[1200px] mx-auto">
        <header class="mb-6 border-b border-slate-700 pb-4 flex justify-between items-center">
            <h2 class="text-2xl font-black text-emerald-400 italic uppercase">KAZCUBE Lab <span class="text-xs text-white not-italic ml-2 tracking-widest">v1.3.0</span></h2>
        </header>

        <div class="main-grid">
            <div class="left-col space-y-4">
                <div id="cube-wrapper" class="shadow-2xl">
                     <twisty-player id="main-cube" puzzle="3x3x3" background="none" control-panel="none"></twisty-player>
                </div>
                
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-5">
                    <input type="range" id="move-slider" min="0" max="0" value="0" class="w-full h-3 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    <div class="flex justify-center items-center gap-2">
                        <button id="nav-first" class="nav-btn">&lt;&lt;</button>
                        <button id="nav-prev" class="nav-btn">&lt;</button>
                        <button id="btn-play" class="nav-btn play-btn">▶</button>
                        <button id="nav-next" class="nav-btn">&gt;</button>
                        <button id="nav-last" class="nav-btn">&gt;&gt;</button>
                    </div>
                    <div class="flex justify-between items-center font-mono pt-2 border-t border-slate-700">
                        <div class="flex flex-col"><span class="text-slate-500 text-[10px] uppercase font-black">Step</span><span id="step-counter" class="text-emerald-500 text-2xl font-black">0</span></div>
                        <div id="move-indicator" class="text-xl font-black bg-slate-900 px-6 py-2 rounded-xl text-emerald-400 border border-slate-700 italic">---</div>
                    </div>
                </div>
            </div>

            <div class="right-col">
                <div class="space-y-3">
                    <textarea id="command-box" class="w-full h-24 bg-black text-emerald-400 p-4 rounded-xl font-mono text-sm border-2 border-slate-700 outline-none focus:border-emerald-500 transition-all" placeholder="R U R' U'"></textarea>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btn-scramble" class="action-btn py-4 bg-indigo-600 text-white text-[12px] shadow-lg active:scale-95 uppercase">Random Scramble</button>
                        <button id="btn-setup" class="action-btn py-4 bg-slate-700 text-amber-400 border-2 border-amber-500/30 text-[12px] active:scale-95 uppercase">Set Setup</button>
                        <button id="btn-reset" class="action-btn col-span-2 py-4 bg-rose-600 text-white text-[14px] shadow-lg active:scale-95 uppercase">Reset</button>
                    </div>
                </div>

                <div class="bg-slate-800/40 rounded-xl border border-slate-700 p-4">
                    <div class="flex gap-1.5 mb-4 bg-black/30 p-1.5 rounded-lg">
                        <button id="tab-basic" class="tab-btn active">BASIC</button>
                        <button id="tab-wide" class="tab-btn">WIDE</button>
                        <button id="tab-slice" class="tab-btn">SLICE</button>
                    </div>
                    <div id="move-grid" class="grid grid-cols-6 gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        let activeMoves = []; 
        let isPlaying = false;
        let playInterval = null;
        const player = document.getElementById('main-cube');

        // 手順の逆転（例：R -> R', R' -> R, R2 -> R2）
        const invertMove = (move) => {
            if (move.endsWith("2")) return move;
            if (move.endsWith("'")) return move.slice(0, -1);
            return move + "'";
        };

        const updateView = () => {
            const slider = document.getElementById('move-slider');
            const step = parseInt(slider.value) || 0;
            player.alg = activeMoves.slice(0, step).join(" ");
            document.getElementById('step-counter').textContent = step;
            document.getElementById('move-indicator').textContent = (step > 0 && activeMoves[step-1]) ? activeMoves[step-1] : "---";
        };

        window.addEventListener('DOMContentLoaded', () => {
            // SET SETUP: 入力手順を逆算して「崩し」にセットし、Step 0で崩れた状態にする
            document.getElementById('btn-setup').onclick = () => {
                const val = document.getElementById('command-box').value.trim();
                if (!val) return;

                const moves = val.split(/\s+/).filter(m => m.length > 0);
                // 逆順の逆回転手順を作成してセットアップとして埋め込む
                const inverse = moves.slice().reverse().map(invertMove).join(" ");
                
                player.experimentalSetupAlg = inverse; // これでStep 0が崩れた状態になる
                activeMoves = moves; // 順方向の手順を再生対象にする
                
                const slider = document.getElementById('move-slider');
                slider.max = activeMoves.length;
                slider.value = 0; // 開始地点にセット
                updateView();
            };

            // RANDOM SCRAMBLE: 適当に崩して、最後の手（崩れきった状態）にする
            document.getElementById('btn-scramble').onclick = () => {
                const faces = ['U','D','L','R','F','B'], mods = ['', "'", '2'];
                const scramble = Array.from({length:20}, () => faces[Math.floor(Math.random()*6)] + mods[Math.floor(Math.random()*3)]);
                
                document.getElementById('command-box').value = scramble.join(" ");
                player.experimentalSetupAlg = ""; // セットアップはクリア
                activeMoves = scramble;
                
                const slider = document.getElementById('move-slider');
                slider.max = activeMoves.length;
                slider.value = activeMoves.length; // 崩し終了状態にする
                updateView();
            };

            // RESET: すべてを初期化
            document.getElementById('btn-reset').onclick = () => {
                player.experimentalSetupAlg = "";
                player.alg = "";
                activeMoves = [];
                document.getElementById('command-box').value = "";
                const slider = document.getElementById('move-slider');
                slider.max = 0; slider.value = 0;
                updateView();
            };

            // スライダー・ナビゲーション
            document.getElementById('move-slider').oninput = updateView;
            document.getElementById('nav-first').onclick = () => { document.getElementById('move-slider').value = 0; updateView(); };
            document.getElementById('nav-last').onclick = () => { document.getElementById('move-slider').value = activeMoves.length; updateView(); };
            document.getElementById('nav-prev').onclick = () => { 
                const s = document.getElementById('move-slider');
                if(parseInt(s.value) > 0) { s.value--; updateView(); }
            };
            document.getElementById('nav-next').onclick = () => {
                const s = document.getElementById('move-slider');
                if(parseInt(s.value) < activeMoves.length) { s.value++; updateView(); }
            };

            // 再生
            document.getElementById('btn-play').onclick = () => {
                if (isPlaying) { 
                    clearInterval(playInterval); 
                    document.getElementById('btn-play').textContent = "▶"; 
                } else {
                    const slider = document.getElementById('move-slider');
                    if (parseInt(slider.value) >= activeMoves.length) slider.value = 0;
                    document.getElementById('btn-play').textContent = "⏸";
                    playInterval = setInterval(() => {
                        if (parseInt(slider.value) < activeMoves.length) { 
                            slider.value++; 
                            updateView(); 
                        } else { 
                            clearInterval(playInterval); 
                            isPlaying = false; 
                            document.getElementById('btn-play').textContent = "▶"; 
                        }
                    }, 800);
                }
                isPlaying = !isPlaying;
            };

            // ボタン生成（省略せず全機能維持）
            const renderMoves = (type) => {
                const grid = document.getElementById('move-grid');
                grid.innerHTML = '';
                const lib = { basic:['U','D','L','R','F','B'], wide:['u','d','l','r','f','b'], slice:['M','E','S','x','y','z'] };
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-'+type));
                lib[type].forEach(f => {
                    [f, f+"'", f+"2"].forEach(m => {
                        const b = document.createElement('button');
                        b.className = "move-btn"; b.textContent = m;
                        b.onclick = () => {
                            const slider = document.getElementById('move-slider');
                            activeMoves = activeMoves.slice(0, parseInt(slider.value));
                            activeMoves.push(m);
                            slider.max = activeMoves.length;
                            slider.value = activeMoves.length;
                            document.getElementById('command-box').value = activeMoves.join(" ");
                            updateView();
                        };
                        grid.appendChild(b);
                    });
                });
            };
            document.getElementById('tab-basic').onclick = () => renderMoves('basic');
            document.getElementById('tab-wide').onclick = () => renderMoves('wide');
            document.getElementById('tab-slice').onclick = () => renderMoves('slice');
            renderMoves('basic');
        });
    </script>
</body>
</html>
