<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>KAZCUBE Lab - v1.2.1 Robust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #cube-container { width: 100%; height: 350px; background: #000; border-radius: 1rem; border: 2px solid #475569; overflow: hidden; margin-bottom: 20px; }
        twisty-player { width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s; }
        twisty-player.ready { opacity: 1; }
        .move-btn { background: #1e293b; color: white; padding: 12px 0; border-radius: 8px; font-family: monospace; font-weight: bold; border: 1px solid #475569; cursor: pointer; text-align: center; user-select: none; transition: 0.1s; }
        .move-btn:active { background: #3b82f6; transform: scale(0.92); }
        #hash-io { width: 100%; background: #000; color: #10b981; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 8px; border: 1px solid #334155; min-height: 40px; }
    </style>
</head>
<body class="bg-slate-900 text-white p-6">

    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold text-emerald-400 mb-4 italic uppercase">Phase 1.2.1 Robust Test</h1>

        <div id="cube-container">
            <twisty-player id="main-cube" puzzle="3x3x3" background="none" control-panel="none"></twisty-player>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-6">
            <button class="move-btn" onclick="safeMove('U')">U</button>
            <button class="move-btn" onclick="safeMove('U\'')">U'</button>
            <button class="move-btn" onclick="safeMove('D')">D</button>
            <button class="move-btn" onclick="safeMove('D\'')">D'</button>
            <button class="move-btn" onclick="safeMove('L')">L</button>
            <button class="move-btn" onclick="safeMove('L\'')">L'</button>
            <button class="move-btn" onclick="safeMove('R')">R</button>
            <button class="move-btn" onclick="safeMove('R\'')">R'</button>
            <button class="move-btn" onclick="safeMove('F')">F</button>
            <button class="move-btn" onclick="safeMove('F\'')">F'</button>
            <button class="move-btn" onclick="safeMove('B')">B</button>
            <button class="move-btn" onclick="safeMove('B\'')">B'</button>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <button id="btn-copy" onclick="copyLink()" class="w-full bg-indigo-600 p-3 rounded font-black mb-3 text-xs uppercase transition">Copy Share URL</button>
            <input type="text" id="hash-io" readonly placeholder="Waiting for library...">
        </div>
    </div>

    <script type="module">
        import { KociembaLibrary } from "https://cdn.cubing.net/v0/js/cubing/search";
        import "https://cdn.cubing.net/v0/js/cubing/twisty";

        const player = document.getElementById('main-cube');
        const hashIo = document.getElementById('hash-io');

        // キューブが準備完了したかチェックする関数
        const isReady = () => player && typeof player.applyMove === 'function';

        // 回転実行（グローバルに公開）
        window.safeMove = async (move) => {
            if (isReady()) {
                await player.applyMove(move);
                updateHash();
            } else {
                console.log("Player not ready yet...");
            }
        };

        // ハッシュ更新
        async function updateHash() {
            try {
                if (!isReady()) return;
                const pattern = await player.experimentalGetPattern();
                const kString = await KociembaLibrary.patternToKociembaString(pattern);
                hashIo.value = "v1.2:" + btoa(JSON.stringify({ k: kString }));
            } catch (e) { console.error(e); }
        }
